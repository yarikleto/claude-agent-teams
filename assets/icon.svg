<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="claude-agent-teams icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF6EE"/>
      <stop offset="100%" stop-color="#FFE3D0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- connection arcs (team threads) -->
  <g stroke="#E8A37A" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M128 92 C 95 130, 95 145, 90 168"/>
    <path d="M128 92 C 161 130, 161 145, 166 168"/>
    <path d="M90 178 C 110 195, 146 195, 166 178"/>
  </g>

  <!-- leader (top) — orange -->
  <g>
    <circle cx="128" cy="86" r="34" fill="#FF8A5C"/>
    <circle cx="128" cy="86" r="34" fill="none" stroke="#C95E2F" stroke-width="2.5" opacity="0.4"/>
    <circle cx="118" cy="82" r="3.6" fill="#3A1B0A"/>
    <circle cx="138" cy="82" r="3.6" fill="#3A1B0A"/>
    <path d="M119 96 Q 128 102 137 96" stroke="#3A1B0A" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <!-- tiny crown to mark orchestrator -->
    <path d="M114 58 L120 50 L128 56 L136 50 L142 58 Z" fill="#FFD27A" stroke="#C9892F" stroke-width="1.8" stroke-linejoin="round"/>
  </g>

  <!-- teammate left — teal -->
  <g>
    <circle cx="84" cy="178" r="28" fill="#5CC8C8"/>
    <circle cx="84" cy="178" r="28" fill="none" stroke="#2F8F8F" stroke-width="2.5" opacity="0.4"/>
    <circle cx="76" cy="174" r="3" fill="#0E2A2A"/>
    <circle cx="92" cy="174" r="3" fill="#0E2A2A"/>
    <path d="M77 187 Q 84 192 91 187" stroke="#0E2A2A" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  </g>

  <!-- teammate right — pink -->
  <g>
    <circle cx="172" cy="178" r="28" fill="#FF8AAA"/>
    <circle cx="172" cy="178" r="28" fill="none" stroke="#C95577" stroke-width="2.5" opacity="0.4"/>
    <circle cx="164" cy="174" r="3" fill="#3A0E1F"/>
    <circle cx="180" cy="174" r="3" fill="#3A0E1F"/>
    <path d="M165 187 Q 172 192 179 187" stroke="#3A0E1F" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  </g>

  <!-- subtle ground shadow -->
  <ellipse cx="128" cy="222" rx="72" ry="6" fill="#E8A37A" opacity="0.25" filter="url(#soft)"/>
</svg>
